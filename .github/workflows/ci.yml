name: CI — Lint, Security & Tests

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

jobs:
  # ---------------------------------------------------------------------------
  # 1. Lint & format
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & Format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: ruff check
        run: uv run ruff check .

      - name: ruff format (check only)
        run: uv run ruff format --check .

  # ---------------------------------------------------------------------------
  # 2. Unit tests
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: |
          if [ -d tests ]; then
            uv run pytest tests/ -v --tb=short -q
          else
            echo "No tests directory — skipping."
          fi

  # ---------------------------------------------------------------------------
  # 3. SAST (Bandit)
  # ---------------------------------------------------------------------------
  sast:
    name: SAST (Bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Bandit
        run: >
          uvx bandit
          -r src/
          -ll
          -f json
          -o bandit-report.json
          || true

      - name: Fail on HIGH findings
        run: |
          if [ -f bandit-report.json ]; then
            python3 -c "
          import json, sys
          r = json.load(open('bandit-report.json'))
          high = [i for i in r.get('results', []) if i['issue_severity'] == 'HIGH']
          for i in high:
              print(f\"[HIGH] {i['issue_text']} — {i['filename']}:{i['line_number']}\")
          sys.exit(1 if high else 0)
          "
          fi

  # ---------------------------------------------------------------------------
  # 4. Dependency audit
  # ---------------------------------------------------------------------------
  dependency-audit:
    name: Dependency Audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python 3.12
        run: uv python install 3.12

      - name: Export lockfile as requirements
        run: uv export --no-hashes --format requirements-txt | sed 's/+[a-z][a-z0-9]*//' > /tmp/requirements.txt

      - name: pip-audit
        run: uvx pip-audit -r /tmp/requirements.txt

  # ---------------------------------------------------------------------------
  # 5. Secret scanning
  # ---------------------------------------------------------------------------
  secret-scan:
    name: Secret Scan (Gitleaks)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # 6. Trivy filesystem scan
  # ---------------------------------------------------------------------------
  trivy-scan:
    name: Trivy FS Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: 1
          ignore-unfixed: true
          format: table

  # ---------------------------------------------------------------------------
  # 7. Publish to PyPI (tag-triggered, all checks must pass)
  # ---------------------------------------------------------------------------
  publish:
    name: Build & Publish to PyPI
    needs: [lint, test, sast, dependency-audit, secret-scan]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - name: Build and publish
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          uv build
          uv publish
